<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VickCopilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
      overflow: hidden;
    }
    .app {
      background: rgba(30, 41, 59, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Arrow cursor EVERYWHERE */
* {
  cursor: default !important;
}

body, html, div, span, button, input, textarea, a, 
.btn, .move-btn, .titlebar-btns button, .nav-btn,
.record-btn, .thumbnail-delete, .code-copy-btn, 
.minimized-v, .thumbnail, .minimize-btn {
  cursor: default !important;
}

/* Only drag bar keeps move cursor */
.drag-bar {
  cursor: move !important;
}

.drag-bar span {
  cursor: move !important;
}

    /* Title bar - COMPACT */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 8px;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .titlebar-logo {
      width: 14px; height: 14px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      color: rgb(120, 118, 118); font-size: 8px; font-weight: bold;
    }
    .titlebar-name {
      color: #98999a;
      font-size: 9px;
      font-weight: 600;
    }
    .titlebar-name span { color: #10b981; }
    .status-dot {
      width: 5px; height: 5px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      margin-left: 4px;
    }
    .status-text {
      color: #10b981;
      font-size: 8px;
      margin-left: 2px;
    }
    .titlebar-btns {
      display: flex;
      gap: 3px;
    }
    .titlebar-btns button {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #94a3b8;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .titlebar-btns button:hover { background: rgba(255,255,255,0.2); color: rgb(108, 101, 101); }

    /* Drag bar - COMPACT */
    /* Drag bar - COMPACT */
.drag-bar {
  -webkit-app-region: drag;
  cursor: move;
  background: rgba(15,23,42,0.5);
  padding: 2px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.drag-bar span {
  color: #475569;
  font-size: 8px;
  letter-spacing: 1px;
  -webkit-app-region: drag;
}
    
  .minimize-btn {
  background: rgba(100, 116, 139, 0.15) !important;
  color: #0f172a !important;
  font-weight: 600 !important;
  padding: 1px 10px !important;
  font-size: 8px !important;
}

.minimize-btn:hover {
  background: rgba(71, 85, 105, 0.25) !important;
  color: #0f172a !important;
}



    /* Recording bar - COMPACT */
    .recording-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 2px;
      background: rgba(239, 68, 68, 0.15);
      border-bottom: 1px solid rgba(239, 68, 68, 0.2);
    }
    .recording-bar.active { display: flex; }
    .rec-dot {
      width: 5px; height: 5px;
      background: #ef4444;
      border-radius: 50%;
      animation: recPulse 1.5s ease-in-out infinite;
    }
    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .rec-text { color: #fca5a5; font-size: 9px; }

    /* Input area - COMPACT */
    .input-row {
  display: flex;
  gap: 4px;
  padding: 4px 8px;
  background: rgba(15, 23, 42, 0.3);
  -webkit-app-region: no-drag;
  pointer-events: auto;
  z-index: 100;
}

    .input-row input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 4px 8px;
  color: #e2e8f0;
  font-size: 10px;
  font-family: inherit;
  outline: none;
  -webkit-app-region: no-drag;
  pointer-events: auto;
}

    .input-row input:focus { border-color: #10b981; }
    .input-row input::placeholder { color: #475569; }

    .record-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      min-width: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all 0.2s;
    }
    .record-btn:hover { opacity: 0.9; }
    .record-btn.answer-mode {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    /* Screen capture - COMPACT */
    .screen-capture-section {
  margin: 3px 8px;
  padding: 4px 6px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.05);
  -webkit-app-region: no-drag;
  pointer-events: auto;
}

    .capture-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
  -webkit-app-region: no-drag;
}

    .btn {
      padding: 3px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 9px;
    }

    .btn-capture {
      background: #2196F3;
      color: white;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .btn-capture:hover {
      background: #1976D2;
    }

    .btn-analyze {
      background: #4CAF50;
      color: white;
      padding: 3px 10px;
    }

    .btn-analyze:hover:not(:disabled) {
      background: #45a049;
    }

    .btn-analyze:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.4;
    }

    .thumbnails-container {
  display: flex;
  gap: 3px;
  max-height: 40px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 1px 0;
  -webkit-app-region: no-drag;
  pointer-events: auto;
}

    .thumbnails-container::-webkit-scrollbar {
      height: 2px;
    }

    .thumbnails-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 1px;
    }

    .thumbnail {
  position: relative;
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid #444;
  cursor: pointer;
  flex-shrink: 0;
  width: 50px;
  height: 38px;
  -webkit-app-region: no-drag;
  pointer-events: auto;
}

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnail-delete {
      position: absolute;
      top: 1px;
      right: 1px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      cursor: pointer;
      font-size: 9px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .thumbnail-delete:hover {
      background: #d32f2f;
    }

    #captureCount {
      color: #4CAF50;
      font-weight: bold;
      font-size: 9px;
    }

    /* Answer box - MAXIMIZED */
    .answer-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .answer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 8px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .answer-label { color: #10b981; font-size: 9px; font-weight: 600; }
    .answer-counter { color: #475569; font-size: 9px; margin-left: 4px; }
    .nav-btns { display: flex; gap: 2px; }
    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #64748b;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
    }
    .nav-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.15); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .answer-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  color: #cbd5e1;
  font-size: 10px; /* This will be overridden by JS */
  line-height: 1.5;
  transition: font-size 0.2s ease;
}
    .answer-content::-webkit-scrollbar { width: 3px; }
    .answer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .placeholder-text { color: #475569; text-align: center; padding-top: 30px; font-size: 10px; }
    .question-text { color: #64748b; font-size: 9px; margin-bottom: 6px; font-weight: 600; }

    .typing-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      background: #10b981;
      border-radius: 50%;
      margin: 0 1px;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .mode-active {
      background: rgba(16, 185, 129, 0.3) !important;
      color: #10b981 !important;
    }

    /* Code block wrapper */
.code-block-wrapper {
  position: relative;
  margin: 6px 0;
}

/* Code blocks - COMPACT */
.code-block {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 8px;
  padding-top: 28px; /* Space for copy button */
  border-radius: 4px;
  font-family: Consolas, "Courier New", monospace;
  font-size: 9px;
  line-height: 1.4;
  overflow-x: auto;
  margin: 0;
  white-space: pre-wrap;
}

/* Copy button */
.code-copy-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #cbd5e1;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
}

.code-copy-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  color: white;
}

.code-copy-btn:active {
  transform: scale(0.95);
}

    /* Code blocks - COMPACT */
/* Code block wrapper */
.code-block-wrapper {
  position: relative;
  margin: 8px 0;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

/* Code blocks - ATTRACTIVE */
.code-block {
  background: linear-gradient(135deg, #1e1e2e 0%, #1a1a2e 100%);
  color: #e0e0e0;
  padding: 32px 12px 12px 12px;
  border-radius: 0;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
  font-size: 9px;
  line-height: 1.6;
  overflow-x: auto;
  margin: 0;
  white-space: pre-wrap;
  border-top: 2px solid #10b981;
}

.code-block::-webkit-scrollbar {
  height: 6px;
}

.code-block::-webkit-scrollbar-track {
  background: rgba(0, 0, 0, 0.2);
}

.code-block::-webkit-scrollbar-thumb {
  background: rgba(16, 185, 129, 0.3);
  border-radius: 3px;
}

.code-block::-webkit-scrollbar-thumb:hover {
  background: rgba(16, 185, 129, 0.5);
}

/* Copy button - ATTRACTIVE */
.code-copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: #10b981;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
  font-weight: 600;
  backdrop-filter: blur(4px);
}

.code-copy-btn:hover {
  background: rgba(16, 185, 129, 0.25);
  border-color: rgba(16, 185, 129, 0.5);
  color: #34d399;
  transform: translateY(-1px);
}

.code-copy-btn:active {
  transform: translateY(0);
}

/* Code language label - ATTRACTIVE */
.code-language {
  position: absolute;
  top: 6px;
  left: 10px;
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.15));
  color: #10b981;
  font-size: 8px;
  padding: 4px 8px;
  border-radius: 4px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border: 1px solid rgba(16, 185, 129, 0.3);
  backdrop-filter: blur(4px);
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Inline code - ATTRACTIVE */
.inline-code {
  background: linear-gradient(135deg, #2d2d3d, #252535);
  color: #7dd3fc;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
  font-size: 9px;
  border: 1px solid rgba(125, 211, 252, 0.2);
  font-weight: 500;
}
/* Code language label */
.code-language {
  position: absolute;
  top: 4px;
  left: 8px;
  background: rgba(16, 185, 129, 0.2);
  color: #10b981;
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

    .inline-code {
      background: #2d2d2d;
      color: #9cdcfe;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 9px;
    }

    #answerContent strong {
      font-weight: 700;
    }

    #answerContent em {
      font-style: italic;
    }

    /* Minimized V button */
/* Minimized V button - TOP CENTER */
.minimized-v {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #10b981, #059669);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
  transition: all 0.3s ease;
  z-index: 99999;
  -webkit-app-region: no-drag;
  pointer-events: auto;
  animation: vPulse 2s ease-in-out infinite;
  border: 3px solid white;
}

.minimized-v:hover {
  transform: translateX(-50%) scale(1.15);
  box-shadow: 0 8px 30px rgba(16, 185, 129, 0.8);
}

.minimized-v:active {
  transform: translateX(-50%) scale(1.05);
}

@keyframes vPulse {
  0%, 100% {
    box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
  }
  50% {
    box-shadow: 0 8px 30px rgba(16, 185, 129, 0.9);
  }
}

  <div class="app">

    <!-- Title Bar -->
    <div class="titlebar">
      <div class="titlebar-left">
        <div class="titlebar-logo">V</div>
        <div class="titlebar-name">Vick<span>Copilot</span></div>
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Ready</span>
      </div>
      <div class="titlebar-btns">
        <button onclick="setAudioMode('system')" id="sysModeBtn" class="mode-active" title="System audio (auto)" style="font-size:9px;">🔊</button>
        <button onclick="setAudioMode('mic')" id="micModeBtn" title="Microphone (manual)" style="font-size:9px;">🎤</button>
        <button onclick="window.electronAPI.minimizeCopilot()" style="font-size:9px;">—</button>
        <button onclick="confirmClose()" style="font-size:9px;">✕</button>
      </div>
    </div>

   
    <!-- Drag Bar -->
    <!-- Drag Bar -->
<!-- Drag Bar -->
<!-- Drag Bar -->
<div class="drag-bar" id="dragBar">
  <!-- Left side: resize buttons -->
  <div style="display: flex; gap: 3px; -webkit-app-region: no-drag;">
    <button class="move-btn" onclick="window.electronAPI.resizeCopilot('smaller')" title="Smaller">−</button>
    <button class="move-btn" onclick="window.electronAPI.resizeCopilot('reset')" title="Reset size">◻</button>
    <button class="move-btn" onclick="window.electronAPI.resizeCopilot('bigger')" title="Bigger">+</button>
  </div>
  
  <!-- Center: drag text -->
  <span style="color:#475569; font-size:8px; letter-spacing:1px; -webkit-app-region:drag; flex: 1; text-align: center;">⠿⠿⠿ drag to move ⠿⠿⠿</span>
  
  <!-- Right side: minimize button -->
  <button class="move-btn minimize-btn" onclick="toggleMinimize()" title="Minimize to V" id="minimizeBtn" style="-webkit-app-region: no-drag;">Minimize</button>
</div>




    <!-- Recording Bar -->
    <div class="recording-bar" id="recordingBar">
      <div class="rec-dot"></div>
      <span class="rec-text">Listening...</span>

    <!-- Input -->
   <!-- Input -->

    <span id="toggleIcon">⏺</span>
    <span id="toggleText">Record</span>
  </button>
</div>

<!-- Screen Capture Section - COMPACT -->

    <button id="captureBtn" class="btn btn-capture" style="-webkit-app-region: no-drag;">📸</button>
    <div id="thumbnails" class="thumbnails-container" style="flex: 1; margin: 0 4px; -webkit-app-region: no-drag; pointer-events: auto;"></div>

</div>



    
<!-- Answer -->
